services:
  post:
    image: ghcr.io/stockyard-dev/stockyard-post:latest
    ports:
      - "8830:8830"
    environment:
      - PORT=${STOCKYARD_PORT:-8830}
      - DATA_DIR=${STOCKYARD_DATA_DIR:-/data}
      - RETENTION_DAYS=${STOCKYARD_RETENTION_DAYS:-30}
      - POST_LICENSE_KEY=${STOCKYARD_POST_LICENSE_KEY:-}
    volumes:
      - post-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8830/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  post-data:
    driver: local
